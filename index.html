<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>MaxMod</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="header">
      <div class="brand">
        <div class="logo-mark">M</div>
        <div class="logo-text">
          <h1>MaxMod</h1>
          <p>Live Patient Vitals</p>
        </div>
      </div>

      <div class="status">
        <span class="dot"></span>
        Connected
      </div>
    </div>

    <div class="container">
      <div class="card hr-card">
        <div class="card-top">
          <h2>Heart Rate</h2>
          <span class="badge">LIVE</span>
        </div>
        <p id="heartRate">-- BPM</p>
        <div class="mini-line"></div>
      </div>

      <div class="card spo2-card">
        <div class="card-top">
          <h2>SpO₂</h2>
          <span class="badge">LIVE</span>
        </div>
        <p id="spo2">-- %</p>
        <div class="mini-line"></div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
